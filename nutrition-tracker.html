<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥗 減重日記 · 我的營養追蹤師</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --warm-white: #fff9f2;
    --sage: #7a9e7e;
    --sage-light: #a8c5ab;
    --sage-dark: #4d7a52;
    --blush: #e8a598;
    --blush-light: #f5cfc8;
    --gold: #c9933a;
    --gold-light: #f0d5a0;
    --charcoal: #2d2d2d;
    --gray: #6b6b6b;
    --light-gray: #ebebeb;
    --border: #e2d9ce;
    --shadow: rgba(100,80,60,0.10);
    --card-bg: rgba(255,252,248,0.95);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    font-family: 'Noto Serif TC', serif;
    color: var(--charcoal);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(168,197,171,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 80%, rgba(232,165,152,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(201,147,58,0.06) 0%, transparent 80%);
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, var(--sage-dark) 0%, var(--sage) 60%, var(--sage-light) 100%);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .header-inner {
    position: relative;
    padding: 28px 32px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    color: white;
    line-height: 1.2;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-left p {
    color: rgba(255,255,255,0.82);
    font-size: 0.85rem;
    margin-top: 4px;
    font-style: italic;
  }
  .user-badge {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 10px 16px;
    color: white;
    font-size: 0.82rem;
    text-align: right;
    backdrop-filter: blur(8px);
  }
  .user-badge strong { display: block; font-size: 1rem; margin-bottom: 2px; }

  /* ── User Select / Login ── */
  .user-select-overlay {
    position: fixed; inset: 0;
    background: rgba(45,45,45,0.7);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .user-select-card {
    background: var(--warm-white);
    border-radius: 20px;
    padding: 36px 32px;
    max-width: 460px; width: 100%;
    box-shadow: 0 24px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  .user-select-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--sage-dark);
    margin-bottom: 6px;
  }
  .user-select-card p { color: var(--gray); font-size: 0.88rem; margin-bottom: 24px; }
  .user-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .user-btn {
    background: var(--cream);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    color: var(--charcoal);
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 12px;
  }
  .user-btn:hover { border-color: var(--sage); background: rgba(122,158,126,0.08); }
  .user-btn .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--sage-light); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
  .user-btn .info { text-align: left; }
  .user-btn .info small { color: var(--gray); font-size: 0.78rem; display: block; }
  .divider { display: flex; align-items: center; gap: 12px; color: var(--gray); font-size: 0.82rem; margin: 16px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .new-user-form { display: flex; flex-direction: column; gap: 12px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field label { display: block; font-size: 0.8rem; color: var(--gray); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'Noto Serif TC', serif; font-size: 0.9rem;
    background: white; color: var(--charcoal);
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--sage); }

  /* ── Main Layout ── */
  .main { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }
  .tabs {
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 24px;
    backdrop-filter: blur(8px);
  }
  .tab-btn {
    flex: 1; padding: 10px 8px;
    border: none; background: transparent;
    border-radius: 10px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.88rem; color: var(--gray);
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab-btn.active { background: white; color: var(--sage-dark); box-shadow: 0 2px 8px var(--shadow); font-weight: 600; }

  /* ── Cards ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 18px;
    box-shadow: 0 4px 16px var(--shadow);
  }
  .card-title {
    font-size: 1.05rem; font-weight: 700; color: var(--sage-dark);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .card-title .icon { font-size: 1.2rem; }

  /* ── Progress ── */
  .progress-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
  .progress-item {
    background: linear-gradient(135deg, rgba(122,158,126,0.1), rgba(168,197,171,0.05));
    border: 1px solid rgba(122,158,126,0.25);
    border-radius: 12px; padding: 14px;
    text-align: center;
  }
  .progress-item .label { font-size: 0.75rem; color: var(--gray); margin-bottom: 4px; }
  .progress-item .value { font-size: 1.4rem; font-weight: 700; color: var(--sage-dark); font-family: 'DM Mono', monospace; }
  .progress-item .unit { font-size: 0.75rem; color: var(--gray); }
  .progress-bar-wrap { margin-top: 12px; }
  .progress-bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--gray); margin-bottom: 6px; }
  .progress-bar { height: 10px; background: var(--light-gray); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage) 0%, var(--sage-light) 100%);
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
  }

  /* ── Food Upload ── */
  .upload-area {
    border: 2px dashed var(--sage-light);
    border-radius: 14px;
    padding: 28px;
    text-align: center;
    background: rgba(168,197,171,0.06);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .upload-area:hover { border-color: var(--sage); background: rgba(122,158,126,0.08); }
  .upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 2.4rem; margin-bottom: 8px; }
  .upload-area p { color: var(--gray); font-size: 0.88rem; }
  .upload-area strong { color: var(--sage-dark); }
  .preview-img { max-width: 100%; max-height: 220px; border-radius: 10px; margin-top: 12px; object-fit: cover; }

  .text-input-area {
    width: 100%; min-height: 80px;
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Noto Serif TC', serif; font-size: 0.92rem;
    color: var(--charcoal); resize: vertical;
    outline: none; transition: border-color 0.2s;
    background: white;
    margin-bottom: 12px;
  }
  .text-input-area:focus { border-color: var(--sage); }

  .btn-primary {
    background: linear-gradient(135deg, var(--sage-dark), var(--sage));
    color: white; border: none; border-radius: 10px;
    padding: 12px 24px; font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem; cursor: pointer;
    transition: all 0.2s; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(77,122,82,0.3); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: white; color: var(--sage-dark);
    border: 1.5px solid var(--sage-light); border-radius: 10px;
    padding: 10px 20px; font-family: 'Noto Serif TC', serif;
    font-size: 0.88rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { background: rgba(122,158,126,0.08); }
  .btn-danger {
    background: white; color: #c0392b;
    border: 1.5px solid #f0b8b2; border-radius: 8px;
    padding: 7px 14px; font-family: 'Noto Serif TC', serif;
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-danger:hover { background: #fff0ee; }

  /* ── Analysis Result ── */
  .analysis-result { margin-top: 18px; }
  .analysis-result .section-head {
    font-size: 0.82rem; font-weight: 700; color: var(--sage-dark);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 16px 0 8px; display: flex; align-items: center; gap: 6px;
  }
  .nutrition-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin-bottom: 4px; }
  .nutrition-table th {
    background: rgba(122,158,126,0.12);
    color: var(--sage-dark); font-weight: 600;
    padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border);
  }
  .nutrition-table td { padding: 8px 12px; border-bottom: 1px solid rgba(226,217,206,0.5); color: var(--charcoal); }
  .nutrition-table tr:last-child td { border-bottom: none; }
  .nutrition-table tr:nth-child(even) td { background: rgba(250,246,240,0.5); }

  .analysis-prose {
    font-size: 0.9rem; line-height: 1.8;
    color: var(--charcoal); white-space: pre-wrap;
  }
  .analysis-prose em { color: var(--sage-dark); font-style: normal; font-weight: 600; }

  /* ── Calorie Display ── */
  .calorie-big {
    font-family: 'DM Mono', monospace;
    font-size: 2.6rem; font-weight: 500;
    color: var(--gold);
    text-align: center; margin: 8px 0 4px;
  }
  .calorie-label { text-align: center; font-size: 0.82rem; color: var(--gray); }
  .deficit-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, rgba(122,158,126,0.15), rgba(168,197,171,0.1));
    border: 1px solid rgba(122,158,126,0.3);
    border-radius: 99px; padding: 6px 16px;
    font-size: 0.85rem; color: var(--sage-dark); font-weight: 600;
    margin: 8px auto 0; display: flex; width: fit-content;
  }
  .deficit-badge.warn { background: rgba(201,147,58,0.1); border-color: rgba(201,147,58,0.3); color: var(--gold); }
  .deficit-badge.bad { background: rgba(192,57,43,0.08); border-color: rgba(192,57,43,0.2); color: #c0392b; }

  /* ── History ── */
  .history-item {
    background: white; border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    margin-bottom: 10px; cursor: pointer;
    transition: all 0.15s;
  }
  .history-item:hover { border-color: var(--sage-light); box-shadow: 0 3px 10px var(--shadow); }
  .history-item-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .history-item-date { font-size: 0.82rem; color: var(--gray); }
  .history-item-cal { font-family: 'DM Mono', monospace; color: var(--gold); font-size: 1rem; font-weight: 500; }
  .history-item-desc { font-size: 0.88rem; color: var(--charcoal); }
  .history-item-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .chip {
    font-size: 0.75rem; padding: 2px 10px; border-radius: 99px;
    background: rgba(122,158,126,0.12); color: var(--sage-dark); border: 1px solid rgba(122,158,126,0.2);
  }

  /* ── Weight ── */
  .weight-entries { display: flex; flex-direction: column; gap: 8px; }
  .weight-entry {
    display: flex; align-items: center; justify-content: space-between;
    background: white; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
  }
  .weight-entry .date { font-size: 0.82rem; color: var(--gray); }
  .weight-entry .kg { font-family: 'DM Mono', monospace; font-size: 1.2rem; color: var(--sage-dark); font-weight: 500; }
  .weight-entry .delta { font-size: 0.82rem; }
  .delta-pos { color: #c0392b; }
  .delta-neg { color: var(--sage-dark); }

  .weight-input-row { display: flex; gap: 10px; align-items: flex-end; }
  .weight-input-row .field { flex: 1; }

  /* ── Loading ── */
  .loading-dots { display: inline-flex; gap: 5px; align-items: center; }
  .loading-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--sage); display: inline-block;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: var(--charcoal); color: white;
    padding: 12px 24px; border-radius: 99px;
    font-size: 0.88rem; z-index: 999;
    animation: fadeUp 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
    pointer-events: none;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes fadeOut { to{opacity:0} }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  /* ── Chart ── */
  .chart-wrap { position: relative; height: 160px; margin: 8px 0; }
  canvas { width: 100% !important; }

  /* ── Detail Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(45,45,45,0.6); backdrop-filter: blur(4px);
    z-index: 900; display: flex; align-items: flex-end; justify-content: center;
    padding: 20px;
  }
  .modal-card {
    background: var(--warm-white);
    border-radius: 20px 20px 16px 16px;
    width: 100%; max-width: 660px; max-height: 82vh;
    overflow-y: auto; padding: 24px;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
  }
  .modal-card h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--sage-dark); margin-bottom: 16px; }

  @media (max-width: 600px) {
    .header-inner { padding: 20px 16px; }
    .header-left h1 { font-size: 1.4rem; }
    .progress-grid { grid-template-columns: 1fr 1fr; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>

<!-- User Select Overlay -->
<div class="user-select-overlay" id="userOverlay">
  <div class="user-select-card">
    <div style="font-size:2.4rem;margin-bottom:12px">🥗</div>
    <h2>歡迎回來！</h2>
    <p>選擇你的帳號，或建立新帳號開始使用</p>
    <div class="user-list" id="userList"></div>
    <div class="divider">或</div>
    <div class="new-user-form" id="newUserForm">
      <div class="field">
        <label>👤 姓名 / 暱稱</label>
        <input type="text" id="newName" placeholder="例如：小美、媽媽">
      </div>
      <div class="form-row">
        <div class="field">
          <label>🎂 年齡</label>
          <input type="number" id="newAge" placeholder="34" min="10" max="99">
        </div>
        <div class="field">
          <label>⚧ 性別</label>
          <select id="newGender">
            <option value="female">女性</option>
            <option value="male">男性</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>📏 身高 (cm)</label>
          <input type="number" id="newHeight" placeholder="159" min="100" max="230">
        </div>
        <div class="field">
          <label>⚖️ 目前體重 (kg)</label>
          <input type="number" id="newWeight" step="0.1" placeholder="69" min="30" max="200">
        </div>
      </div>
      <div class="field">
        <label>🎯 目標體重 (kg)</label>
        <input type="number" id="newGoal" step="0.1" placeholder="55" min="30" max="200">
      </div>
      <div class="field">
        <label>📅 起始日期</label>
        <input type="date" id="newStartDate">
      </div>
      <button class="btn-primary" onclick="createUser()">✨ 建立我的帳號</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <h1>🥗 減重日記</h1>
      <p>你的專屬營養追蹤師，陪你邁向目標 ✨</p>
    </div>
    <div class="user-badge" id="headerBadge" style="display:none">
      <strong id="headerName">—</strong>
      <span id="headerGoal">目標：— kg</span>
    </div>
  </div>
</div>

<div class="main" id="mainApp" style="display:none">

  <!-- Progress Overview -->
  <div class="card" id="progressCard">
    <div class="card-title"><span class="icon">📊</span>我的進度</div>
    <div class="progress-grid">
      <div class="progress-item">
        <div class="label">🏁 起始體重</div>
        <div class="value" id="startWeightDisplay">—</div>
        <div class="unit">kg</div>
      </div>
      <div class="progress-item">
        <div class="label">⚖️ 目前體重</div>
        <div class="value" id="currentWeightDisplay">—</div>
        <div class="unit">kg</div>
      </div>
      <div class="progress-item">
        <div class="label">🎯 目標體重</div>
        <div class="value" id="goalWeightDisplay">—</div>
        <div class="unit">kg</div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-label">
        <span>已減 <strong id="lostKg">0</strong> kg 🎉</span>
        <span>還差 <strong id="remainKg">—</strong> kg</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div id="tdeeInfo" style="margin-top:14px;font-size:0.83rem;color:var(--gray);line-height:1.7"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('log')" id="tab-log">🍱 今日飲食</button>
    <button class="tab-btn" onclick="switchTab('history')" id="tab-history">📖 飲食紀錄</button>
    <button class="tab-btn" onclick="switchTab('weight')" id="tab-weight">⚖️ 體重追蹤</button>
  </div>

  <!-- Tab: Log -->
  <div id="panel-log">
    <div class="card">
      <div class="card-title"><span class="icon">📸</span>上傳今日飲食</div>

      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        <div class="upload-icon">📷</div>
        <p><strong>點擊上傳照片</strong> 或拖曳圖片到這裡</p>
        <p style="font-size:0.78rem;margin-top:4px">支援 JPG、PNG、HEIC 等格式</p>
        <img id="previewImg" class="preview-img" style="display:none">
      </div>

      <div style="margin:14px 0;display:flex;align-items:center;gap:12px;color:var(--gray);font-size:0.82rem">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        也可以文字描述
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>

      <textarea class="text-input-area" id="foodText" placeholder="例如：今天午餐吃了一碗排骨飯（普通份量）、一杯珍珠奶茶（半糖少冰）和一顆茶葉蛋。&#10;&#10;或是任何你想讓我幫你分析的飲食內容～"></textarea>

      <div style="display:flex;gap:10px">
        <div class="field" style="flex:1">
          <label style="font-size:0.8rem;color:var(--gray);display:block;margin-bottom:4px">🍽️ 餐別</label>
          <select class="field" id="mealType" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Serif TC',serif;font-size:0.9rem;background:white;outline:none">
            <option value="早餐">早餐</option>
            <option value="午餐">午餐</option>
            <option value="晚餐">晚餐</option>
            <option value="點心">點心/宵夜</option>
          </select>
        </div>
        <div class="field" style="flex:1">
          <label style="font-size:0.8rem;color:var(--gray);display:block;margin-bottom:4px">📅 日期</label>
          <input type="date" id="logDate" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Serif TC',serif;font-size:0.9rem;background:white;outline:none">
        </div>
      </div>

      <div style="margin-top:12px">
        <button class="btn-primary" id="analyzeBtn" onclick="analyzeFood()">
          <span>🔍 分析這餐的營養</span>
        </button>
      </div>
    </div>

    <!-- Today Summary -->
    <div class="card" id="todaySummary" style="display:none">
      <div class="card-title"><span class="icon">📋</span>今日摘要</div>
      <div id="todaySummaryContent"></div>
    </div>

    <!-- Analysis Result -->
    <div class="card" id="analysisCard" style="display:none">
      <div class="card-title"><span class="icon">🧪</span>營養分析結果</div>
      <div id="analysisResult"></div>
    </div>
  </div>

  <!-- Tab: History -->
  <div id="panel-history" style="display:none">
    <div class="card">
      <div class="card-title"><span class="icon">📖</span>飲食歷史紀錄</div>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- Tab: Weight -->
  <div id="panel-weight" style="display:none">
    <div class="card">
      <div class="card-title"><span class="icon">⚖️</span>記錄體重</div>
      <p style="font-size:0.83rem;color:var(--gray);margin-bottom:16px">💡 建議每 3-5 天量一次，固定早晨起床後、如廁後測量最準確！</p>
      <div class="weight-input-row">
        <div class="field">
          <label style="font-size:0.8rem;color:var(--gray);display:block;margin-bottom:4px">日期</label>
          <input type="date" id="weightDate" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Serif TC',serif;font-size:0.9rem;background:white;outline:none">
        </div>
        <div class="field">
          <label style="font-size:0.8rem;color:var(--gray);display:block;margin-bottom:4px">體重 (kg)</label>
          <input type="number" id="weightInput" step="0.1" min="30" max="200" placeholder="69.0" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Serif TC',serif;font-size:0.9rem;background:white;outline:none">
        </div>
        <div style="padding-bottom:0">
          <button class="btn-primary" onclick="addWeight()" style="width:auto;padding:10px 18px">記錄 ✅</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">📈</span>體重趨勢</div>
      <div class="chart-wrap">
        <canvas id="weightChart"></canvas>
      </div>
      <div class="weight-entries" id="weightList"></div>
    </div>
  </div>

</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal-card" id="modalCard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 id="modalTitle">詳細資料</h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray)">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ─── Storage Helpers ───
const STORE_KEY = 'nutritionApp_v2';

function loadStore() {
  try {
    return JSON.parse(localStorage.getItem(STORE_KEY) || '{"users":{}}');
  } catch { return { users: {} }; }
}
function saveStore(store) {
  localStorage.setItem(STORE_KEY, JSON.stringify(store));
}

// ─── State ───
let store = loadStore();
let currentUserId = null;
let currentUser = null;
let selectedFile = null;
let selectedFileData = null; // base64

// ─── Init ───
function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('logDate').value = today;
  document.getElementById('weightDate').value = today;
  document.getElementById('newStartDate').value = today;
  renderUserList();
}

// ─── User Management ───
function renderUserList() {
  const list = document.getElementById('userList');
  const users = Object.values(store.users);
  if (users.length === 0) {
    list.innerHTML = '<p style="color:var(--gray);font-size:0.85rem;text-align:center;padding:8px 0">尚無帳號，請建立新帳號 👇</p>';
    return;
  }
  list.innerHTML = users.map(u => {
    const w = getCurrentWeight(u);
    return `<button class="user-btn" onclick="loginUser('${u.id}')">
      <div class="avatar">${u.name[0] || '👤'}</div>
      <div class="info">
        <span>${u.name}</span>
        <small>目前 ${w} kg ／目標 ${u.goalWeight} kg</small>
      </div>
    </button>`;
  }).join('');
}

function getCurrentWeight(u) {
  if (!u.weights || u.weights.length === 0) return u.startWeight;
  return u.weights[u.weights.length - 1].kg;
}

function loginUser(id) {
  currentUserId = id;
  currentUser = store.users[id];
  document.getElementById('userOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('headerBadge').style.display = 'block';
  document.getElementById('headerName').textContent = currentUser.name + ' 👋';
  document.getElementById('headerGoal').textContent = `目標：${currentUser.goalWeight} kg`;
  updateProgress();
  renderTodaySummary();
  renderHistory();
  renderWeightList();
}

function createUser() {
  const name = document.getElementById('newName').value.trim();
  const age = parseInt(document.getElementById('newAge').value);
  const gender = document.getElementById('newGender').value;
  const height = parseFloat(document.getElementById('newHeight').value);
  const weight = parseFloat(document.getElementById('newWeight').value);
  const goal = parseFloat(document.getElementById('newGoal').value);
  const startDate = document.getElementById('newStartDate').value;

  if (!name || !age || !height || !weight || !goal || !startDate) {
    showToast('請填寫所有欄位 😅'); return;
  }
  if (goal >= weight) {
    showToast('目標體重應低於目前體重喔！'); return;
  }

  const id = 'user_' + Date.now();
  const user = {
    id, name, age, gender, height,
    startWeight: weight, goalWeight: goal, startDate,
    weights: [{ date: startDate, kg: weight }],
    foodLogs: []
  };
  store.users[id] = user;
  saveStore(store);
  loginUser(id);
}

// ─── Progress ───
function calcTDEE(user) {
  const w = getCurrentWeight(user);
  // Mifflin-St Jeor
  let bmr;
  if (user.gender === 'female') {
    bmr = 10 * w + 6.25 * user.height - 5 * user.age - 161;
  } else {
    bmr = 10 * w + 6.25 * user.height - 5 * user.age + 5;
  }
  return Math.round(bmr * 1.4); // lightly active
}

function updateProgress() {
  const u = currentUser;
  const cw = getCurrentWeight(u);
  const lost = Math.max(0, u.startWeight - cw).toFixed(1);
  const remain = Math.max(0, cw - u.goalWeight).toFixed(1);
  const total = u.startWeight - u.goalWeight;
  const pct = total <= 0 ? 0 : Math.min(100, ((u.startWeight - cw) / total) * 100);

  document.getElementById('startWeightDisplay').textContent = u.startWeight;
  document.getElementById('currentWeightDisplay').textContent = cw;
  document.getElementById('goalWeightDisplay').textContent = u.goalWeight;
  document.getElementById('lostKg').textContent = lost;
  document.getElementById('remainKg').textContent = remain;
  document.getElementById('progressFill').style.width = pct.toFixed(1) + '%';

  const tdee = calcTDEE(u);
  const target = Math.round(tdee - 500); // 500 kcal deficit → ~0.5kg/week
  const weeksLeft = Math.round(remain / 0.5);
  document.getElementById('tdeeInfo').innerHTML =
    `⚡ 每日建議攝取熱量：<strong style="color:var(--sage-dark)">${target} kcal</strong>（TDEE ${tdee} - 赤字 500）<br>` +
    `📅 預計還需約 <strong style="color:var(--gold)">${weeksLeft} 週</strong> 達標（以每週減 0.5kg 計算）`;
}

// ─── File Upload ───
function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    selectedFileData = e.target.result.split(',')[1]; // base64
    const img = document.getElementById('previewImg');
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

// ─── Analyze Food ───
async function analyzeFood() {
  const text = document.getElementById('foodText').value.trim();
  const mealType = document.getElementById('mealType').value;
  const logDate = document.getElementById('logDate').value;

  if (!text && !selectedFileData) {
    showToast('請上傳照片或輸入飲食內容 😊'); return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div> 分析中，請稍候…';

  const u = currentUser;
  const tdee = calcTDEE(u);
  const targetCal = Math.round(tdee - 500);
  const cw = getCurrentWeight(u);

  // Build today's consumed calories
  const todayLogs = (u.foodLogs || []).filter(l => l.date === logDate);
  const todayCal = todayLogs.reduce((s, l) => s + (l.calories || 0), 0);

  const systemPrompt = `你是一位專業的台灣營養師兼減重指導師，非常熟悉台灣在地食物。
用戶資料：${u.gender === 'female' ? '女性' : '男性'}，${u.age}歲，身高${u.height}cm，目前體重${cw}kg，目標體重${u.goalWeight}kg。
每日TDEE約${tdee}大卡，建議每日攝取${targetCal}大卡（熱量赤字500大卡）。
今天（${logDate}）${mealType}前已累積攝取約${todayCal}大卡。

請針對用戶這餐的飲食進行詳細分析，用繁體中文、清楚的分點格式、搭配適當的表情符號回覆。

必須包含以下各區塊（用 [SECTION:標題] 標記每個區塊）：

[SECTION:🧪 營養成分表格]
用JSON格式回傳，包含 items 陣列（每項食物）和 total，格式：
{"items":[{"name":"食物名稱","protein":數字,"carbs":數字,"fat":數字,"sugar":數字,"calories":數字,"unit":"份量說明"}],"total":{"protein":數字,"carbs":數字,"fat":數字,"sugar":數字,"calories":數字}}

[SECTION:🔥 熱量分析]
這餐幾大卡、今日累積多少大卡、離目標還差多少、熱量赤字狀況評估。

[SECTION:✅ 飲食優點]
這餐吃得好的地方，2-4點。

[SECTION:⚠️ 需要注意]
這餐可以改善的地方，2-4點。

[SECTION:💡 今日建議]
今天接下來的飲食建議，具體可行。

[SECTION:🌅 明日建議]
明天整日的飲食方向建議。

[SECTION:💪 教練的話]
給用戶的鼓勵或提醒（可以溫柔可以嚴厲，有點幽默可愛也很好，50-80字）。

注意：
- 熱量與營養成分請根據台灣常見份量合理估算
- 如果是照片請仔細辨識所有食物
- 語氣要像真實的營養師教練，不要太制式
- JSON區塊只有純JSON，不要有markdown符號`;

  const userContent = [];
  if (selectedFileData) {
    const mtype = selectedFile.type || 'image/jpeg';
    userContent.push({ type: 'image', source: { type: 'base64', media_type: mtype, data: selectedFileData } });
  }
  const textPart = text ? `${mealType}飲食內容：${text}` : `請分析這張${mealType}照片中的所有食物。`;
  userContent.push({ type: 'text', text: textPart });

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userContent }]
      })
    });
    const data = await resp.json();
    const raw = data.content.map(c => c.text || '').join('\n');

    // Parse sections
    const sections = {};
    const sectionRe = /\[SECTION:([^\]]+)\]([\s\S]*?)(?=\[SECTION:|$)/g;
    let m;
    while ((m = sectionRe.exec(raw)) !== null) {
      sections[m[1].trim()] = m[2].trim();
    }

    // Extract nutrition JSON
    let nutritionData = null;
    const jsonKey = Object.keys(sections).find(k => k.includes('營養成分'));
    if (jsonKey) {
      try {
        const jsonStr = sections[jsonKey].replace(/```json|```/g, '').trim();
        nutritionData = JSON.parse(jsonStr);
      } catch {}
    }

    const totalCal = nutritionData ? nutritionData.total.calories : 0;
    const newLogEntry = {
      id: 'log_' + Date.now(),
      date: logDate, mealType,
      description: text || '（照片分析）',
      calories: totalCal,
      nutrition: nutritionData,
      sections,
      hasImage: !!selectedFileData,
      imageData: selectedFileData || null,
      timestamp: new Date().toISOString()
    };

    if (!currentUser.foodLogs) currentUser.foodLogs = [];
    currentUser.foodLogs.unshift(newLogEntry);
    store.users[currentUserId] = currentUser;
    saveStore(store);

    renderAnalysisResult(newLogEntry, targetCal, todayCal);
    renderTodaySummary();
    renderHistory();

    // Reset
    document.getElementById('foodText').value = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('previewImg').style.display = 'none';
    selectedFile = null;
    selectedFileData = null;

  } catch (err) {
    showToast('分析失敗，請檢查網路後再試 😢');
    console.error(err);
  }

  btn.disabled = false;
  btn.innerHTML = '<span>🔍 分析這餐的營養</span>';
}

function renderAnalysisResult(log, targetCal, prevCal) {
  const card = document.getElementById('analysisCard');
  const result = document.getElementById('analysisResult');
  card.style.display = 'block';
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const newTotal = prevCal + log.calories;
  const remain = targetCal - newTotal;
  const deficitClass = remain > 0 ? '' : (remain > -300 ? 'warn' : 'bad');
  const deficitText = remain > 0
    ? `今日還剩 ${remain} kcal 空間 👍`
    : `今日已超出 ${Math.abs(remain)} kcal ⚠️`;

  let html = `
    <div style="text-align:center;margin-bottom:16px">
      <div class="calorie-label">這餐熱量</div>
      <div class="calorie-big">${log.calories} <span style="font-size:1rem;color:var(--gray)">kcal</span></div>
      <div class="deficit-badge ${deficitClass}">${deficitText}</div>
    </div>`;

  // Nutrition table
  if (log.nutrition) {
    html += `<div class="section-head">🧪 營養成分明細</div>`;
    html += `<table class="nutrition-table">
      <thead><tr><th>食物</th><th>份量</th><th>熱量</th><th>蛋白質</th><th>碳水</th><th>糖</th><th>脂肪</th></tr></thead>
      <tbody>`;
    (log.nutrition.items || []).forEach(item => {
      html += `<tr>
        <td>${item.name}</td>
        <td style="color:var(--gray)">${item.unit || '—'}</td>
        <td style="color:var(--gold);font-family:'DM Mono',monospace">${item.calories}</td>
        <td>${item.protein}g</td>
        <td>${item.carbs}g</td>
        <td>${item.sugar}g</td>
        <td>${item.fat}g</td>
      </tr>`;
    });
    const t = log.nutrition.total;
    html += `<tr style="font-weight:700;background:rgba(122,158,126,0.1)">
      <td colspan="2">合計</td>
      <td style="color:var(--gold);font-family:'DM Mono',monospace">${t.calories}</td>
      <td>${t.protein}g</td><td>${t.carbs}g</td><td>${t.sugar}g</td><td>${t.fat}g</td>
    </tr></tbody></table>`;
  }

  // Other sections
  const sectionOrder = ['🔥 熱量分析','✅ 飲食優點','⚠️ 需要注意','💡 今日建議','🌅 明日建議','💪 教練的話'];
  sectionOrder.forEach(key => {
    const content = log.sections?.[key];
    if (!content) return;
    const isCoach = key.includes('教練');
    html += `<div class="section-head">${key}</div>
      <div class="${isCoach ? 'deficit-badge' : 'analysis-prose'}" style="${isCoach ? 'width:100%;border-radius:10px;padding:14px 16px;margin:0;font-size:0.88rem;line-height:1.8;display:block;text-align:left' : ''}">${content}</div>`;
  });

  result.innerHTML = html;
}

// ─── Today Summary ───
function renderTodaySummary() {
  const today = document.getElementById('logDate').value;
  const logs = (currentUser.foodLogs || []).filter(l => l.date === today);
  const card = document.getElementById('todaySummary');
  const content = document.getElementById('todaySummaryContent');
  if (logs.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  const totalCal = logs.reduce((s, l) => s + (l.calories || 0), 0);
  const tdee = calcTDEE(currentUser);
  const target = tdee - 500;
  const remain = target - totalCal;
  content.innerHTML = `
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px">
      <div style="flex:1;min-width:120px;text-align:center;padding:12px;background:rgba(201,147,58,0.08);border-radius:10px">
        <div style="font-size:0.78rem;color:var(--gray)">今日已攝取</div>
        <div style="font-family:'DM Mono',monospace;font-size:1.5rem;color:var(--gold)">${totalCal}</div>
        <div style="font-size:0.75rem;color:var(--gray)">kcal</div>
      </div>
      <div style="flex:1;min-width:120px;text-align:center;padding:12px;background:rgba(122,158,126,0.08);border-radius:10px">
        <div style="font-size:0.78rem;color:var(--gray)">每日目標</div>
        <div style="font-family:'DM Mono',monospace;font-size:1.5rem;color:var(--sage-dark)">${target}</div>
        <div style="font-size:0.75rem;color:var(--gray)">kcal</div>
      </div>
      <div style="flex:1;min-width:120px;text-align:center;padding:12px;background:${remain >= 0 ? 'rgba(122,158,126,0.08)' : 'rgba(192,57,43,0.07)'};border-radius:10px">
        <div style="font-size:0.78rem;color:var(--gray)">${remain >= 0 ? '剩餘空間' : '超出'}</div>
        <div style="font-family:'DM Mono',monospace;font-size:1.5rem;color:${remain >= 0 ? 'var(--sage-dark)' : '#c0392b'}">${Math.abs(remain)}</div>
        <div style="font-size:0.75rem;color:var(--gray)">kcal</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${logs.map(l => `<div style="display:flex;justify-content:space-between;font-size:0.85rem;padding:6px 10px;background:white;border-radius:8px;border:1px solid var(--border)">
        <span>${l.mealType} · ${l.description.slice(0,30)}${l.description.length > 30 ? '…' : ''}</span>
        <span style="color:var(--gold);font-family:'DM Mono',monospace">${l.calories} kcal</span>
      </div>`).join('')}
    </div>`;
}

// ─── History ───
function renderHistory() {
  const list = document.getElementById('historyList');
  const logs = [...(currentUser.foodLogs || [])].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  if (logs.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🍽️</div><p>還沒有飲食紀錄，快去記錄你的第一餐吧！</p></div>';
    return;
  }

  // Group by date
  const grouped = {};
  logs.forEach(l => {
    if (!grouped[l.date]) grouped[l.date] = [];
    grouped[l.date].push(l);
  });

  list.innerHTML = Object.entries(grouped).map(([date, entries]) => {
    const totalCal = entries.reduce((s, e) => s + (e.calories || 0), 0);
    const dateStr = new Date(date + 'T12:00:00').toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'short' });
    return `<div style="margin-bottom:16px">
      <div style="font-size:0.8rem;font-weight:700;color:var(--gray);margin-bottom:6px;display:flex;justify-content:space-between">
        <span>📅 ${dateStr}</span>
        <span style="color:var(--gold);font-family:'DM Mono',monospace">${totalCal} kcal</span>
      </div>
      ${entries.map(e => `<div class="history-item" onclick="showDetail('${e.id}')">
        <div class="history-item-head">
          <span>${e.mealType}${e.hasImage ? ' 📷' : ''}</span>
          <span class="history-item-cal">${e.calories} kcal</span>
        </div>
        <div class="history-item-desc">${e.description.slice(0,60)}${e.description.length > 60 ? '…' : ''}</div>
        ${e.nutrition ? `<div class="history-item-chips">
          <span class="chip">蛋白質 ${e.nutrition.total.protein}g</span>
          <span class="chip">碳水 ${e.nutrition.total.carbs}g</span>
          <span class="chip">脂肪 ${e.nutrition.total.fat}g</span>
        </div>` : ''}
      </div>`).join('')}
    </div>`;
  }).join('');
}

function showDetail(id) {
  const log = (currentUser.foodLogs || []).find(l => l.id === id);
  if (!log) return;
  const modal = document.getElementById('modalOverlay');
  const body = document.getElementById('modalBody');
  document.getElementById('modalTitle').textContent = `${log.mealType} · ${log.date}`;

  let html = `<div style="text-align:center;margin-bottom:16px">
    <div class="calorie-big">${log.calories} <span style="font-size:1rem;color:var(--gray)">kcal</span></div>
  </div>`;

  if (log.imageData) {
    html += `<img src="data:image/jpeg;base64,${log.imageData}" style="width:100%;border-radius:10px;margin-bottom:14px;object-fit:cover;max-height:200px">`;
  }

  if (log.nutrition) {
    html += `<table class="nutrition-table" style="margin-bottom:14px">
      <thead><tr><th>食物</th><th>熱量</th><th>蛋白質</th><th>碳水</th><th>脂肪</th></tr></thead>
      <tbody>`;
    (log.nutrition.items || []).forEach(item => {
      html += `<tr>
        <td>${item.name}<br><small style="color:var(--gray)">${item.unit || ''}</small></td>
        <td style="color:var(--gold);font-family:'DM Mono',monospace">${item.calories}</td>
        <td>${item.protein}g</td><td>${item.carbs}g</td><td>${item.fat}g</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  const sectionOrder = ['🔥 熱量分析','✅ 飲食優點','⚠️ 需要注意','💡 今日建議','🌅 明日建議','💪 教練的話'];
  sectionOrder.forEach(key => {
    const content = log.sections?.[key];
    if (!content) return;
    html += `<div class="section-head" style="margin-top:12px">${key}</div><div class="analysis-prose" style="font-size:0.87rem">${content}</div>`;
  });

  html += `<div style="margin-top:20px;text-align:right">
    <button class="btn-danger" onclick="deleteLog('${id}')">🗑️ 刪除這筆紀錄</button>
  </div>`;

  body.innerHTML = html;
  modal.style.display = 'flex';
}

function deleteLog(id) {
  if (!confirm('確定刪除這筆記錄嗎？')) return;
  currentUser.foodLogs = (currentUser.foodLogs || []).filter(l => l.id !== id);
  store.users[currentUserId] = currentUser;
  saveStore(store);
  closeModal();
  renderHistory();
  renderTodaySummary();
  showToast('已刪除 ✓');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').style.display = 'none';
}

// ─── Weight ───
function addWeight() {
  const date = document.getElementById('weightDate').value;
  const kg = parseFloat(document.getElementById('weightInput').value);
  if (!date || isNaN(kg) || kg < 30 || kg > 200) {
    showToast('請輸入有效的日期和體重 😅'); return;
  }
  if (!currentUser.weights) currentUser.weights = [];
  // Remove duplicate date
  currentUser.weights = currentUser.weights.filter(w => w.date !== date);
  currentUser.weights.push({ date, kg });
  currentUser.weights.sort((a, b) => a.date.localeCompare(b.date));
  store.users[currentUserId] = currentUser;
  saveStore(store);
  document.getElementById('weightInput').value = '';
  updateProgress();
  renderWeightList();
  showToast(`體重 ${kg} kg 已記錄！💪`);
}

function renderWeightList() {
  const weights = [...(currentUser.weights || [])].sort((a, b) => b.date.localeCompare(a.date));
  const list = document.getElementById('weightList');

  if (weights.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">⚖️</div><p>還沒有體重紀錄</p></div>';
    drawChart([]);
    return;
  }

  list.innerHTML = weights.map((w, i) => {
    const prev = weights[i + 1];
    let delta = '';
    if (prev) {
      const d = (w.kg - prev.kg).toFixed(1);
      delta = d > 0
        ? `<span class="delta delta-pos">▲ ${d}kg</span>`
        : d < 0
        ? `<span class="delta delta-neg">▼ ${Math.abs(d)}kg 🎉</span>`
        : `<span class="delta" style="color:var(--gray)">— 持平</span>`;
    }
    const dateStr = new Date(w.date + 'T12:00:00').toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', weekday: 'short' });
    return `<div class="weight-entry">
      <div class="date">${dateStr}</div>
      <div style="display:flex;align-items:center;gap:12px">
        ${delta}
        <div class="kg">${w.kg} kg</div>
        <button class="btn-danger" style="padding:4px 10px;font-size:0.75rem" onclick="deleteWeight('${w.date}')">✕</button>
      </div>
    </div>`;
  }).join('');

  drawChart([...weights].reverse());
}

function deleteWeight(date) {
  currentUser.weights = (currentUser.weights || []).filter(w => w.date !== date);
  store.users[currentUserId] = currentUser;
  saveStore(store);
  updateProgress();
  renderWeightList();
  showToast('已刪除 ✓');
}

// ─── Chart ───
function drawChart(weights) {
  const canvas = document.getElementById('weightChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 400;
  const H = 150;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.clearRect(0, 0, W, H);

  if (weights.length < 2) {
    ctx.fillStyle = '#aaa';
    ctx.font = '14px Noto Serif TC';
    ctx.textAlign = 'center';
    ctx.fillText('記錄 2 筆以上體重後顯示趨勢圖', W/2, H/2);
    return;
  }

  const vals = weights.map(w => w.kg);
  const minV = Math.min(...vals, currentUser.goalWeight) - 1;
  const maxV = Math.max(...vals) + 1;
  const pad = { l: 38, r: 16, t: 16, b: 30 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  const tx = i => pad.l + (i / (weights.length - 1)) * cw;
  const ty = v => pad.t + (1 - (v - minV) / (maxV - minV)) * ch;

  // Goal line
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = 'rgba(122,158,126,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  const gy = ty(currentUser.goalWeight);
  ctx.moveTo(pad.l, gy); ctx.lineTo(W - pad.r, gy);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(122,158,126,0.7)';
  ctx.font = '10px DM Mono';
  ctx.textAlign = 'left';
  ctx.fillText(`目標 ${currentUser.goalWeight}`, pad.l + 2, gy - 3);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, H - pad.b);
  grad.addColorStop(0, 'rgba(201,147,58,0.25)');
  grad.addColorStop(1, 'rgba(201,147,58,0.02)');
  ctx.beginPath();
  ctx.moveTo(tx(0), ty(vals[0]));
  for (let i = 1; i < vals.length; i++) ctx.lineTo(tx(i), ty(vals[i]));
  ctx.lineTo(tx(vals.length - 1), H - pad.b);
  ctx.lineTo(tx(0), H - pad.b);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#c9933a';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.moveTo(tx(0), ty(vals[0]));
  for (let i = 1; i < vals.length; i++) ctx.lineTo(tx(i), ty(vals[i]));
  ctx.stroke();

  // Dots + labels
  weights.forEach((w, i) => {
    const x = tx(i), y = ty(w.kg);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#c9933a';
    ctx.fill();
    ctx.fillStyle = '#2d2d2d';
    ctx.font = '10px DM Mono';
    ctx.textAlign = 'center';
    ctx.fillText(w.kg, x, y - 8);
    if (i === 0 || i === weights.length - 1 || weights.length <= 6) {
      const d = new Date(w.date + 'T12:00:00');
      ctx.fillStyle = '#888';
      ctx.font = '9px Noto Serif TC';
      ctx.fillText(`${d.getMonth()+1}/${d.getDate()}`, x, H - pad.b + 14);
    }
  });
}

// ─── Tabs ───
function switchTab(tab) {
  ['log','history','weight'].forEach(t => {
    document.getElementById(`panel-${t}`).style.display = t === tab ? 'block' : 'none';
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'history') renderHistory();
  if (tab === 'weight') { renderWeightList(); }
}

// ─── Toast ───
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ─── Start ───
init();
</script>
